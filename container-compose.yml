services:
  serka:
    build:
      context: .
      dockerfile: Containerfile
    image: serka-image
    ports:
      - "8080:8000"
    depends_on:
      - neo4j
      - mongodb
      - mcp
    env_file: .env
    environment:
      - NEO4J_HOST=neo4j
      - MONGO_HOST=mongodb
      - MCP_HOST=mcp
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
    networks:
      - internal

  mcp:
    build:
      context: ./mcp-server
      dockerfile: Containerfile
    image: serka-mcp-image
    ports:
      - "8000:8000"
    environment:
      - NEO4J_HOST=neo4j
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
    networks:
      - internal

  neo4j:
    image: neo4j:5.26.5
    ports:
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    networks:
      - internal

  mongo:
    image: mongo:8.0.6
    container_name: mongodb-container
    networks:
      - internal

networks:
  internal:
    driver: bridge
